<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Tra Cuu Diem Thi</title>
    <style>
        /* CSS thô sơ, dạng hộp văn bản thuần túy, không hiệu ứng lồng khối chặn chuột */
        body { background-color: #ffffff; padding: 20px; color: #000000; font-family: sans-serif; }
        .input-group { margin-bottom: 10px; }
        label { display: inline-block; width: 150px; }
        input { padding: 5px; width: 200px; }
        button { padding: 10px 20px; margin-top: 10px; cursor: pointer; }
        .error-text { color: red; font-weight: bold; margin-top: 15px; display: none; }
        #ketQuaBox { margin-top: 20px; padding: 15px; border: 1px solid #000000; display: none; }
        .line { margin-bottom: 5px; }
        .bold { font-weight: bold; }
        .red-text { color: red; font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>TRA CỨU ĐIỂM ĐGNL 2026</h2>
    
    <!-- KHỐI NHẬP LIỆU GỐC -->
    <div class="input-group">
        <label>Số báo danh:</label>
        <input type="text" id="searchSBD" placeholder="Ví dụ: 08000001">
    </div>
    <div class="input-group">
        <label>Số Căn cước:</label>
        <input type="text" id="searchCCCD" placeholder="Nhập 12 số">
    </div>
    
    <!-- SỬ DỤNG LẠI ONCLICK TRỰC TIẾP NHƯ BẢN ĐẦU TIÊN BẠN CHẠY ĐƯỢC -->
    <button onclick="xuLyTraCuu()">TÌM KIẾM KẾT QUẢ</button>
    
    <div id="errorBox" class="error-text"></div>
    
    <!-- KHỐI KẾT QUẢ HIỂN THỊ THÔ -->
    <div id="ketQuaBox">
        <div class="line">Họ tên: <span id="resName" class="bold"></span></div>
        <div class="line">SBD: <span id="resSBD" class="bold"></span></div>
        <div class="line">Môn 1: <span id="resM1"></span></div>
        <div class="line">Môn 2: <span id="resM2"></span></div>
        <div class="line">Môn 3: <span id="resM3"></span></div>
        <div class="line">Điểm ĐGNL BCA: <span id="resBCA"></span></div>
        <div class="line">Điểm Cộng: <span id="resCong"></span></div>
        <div class="line">IELTS: <span id="resIELTS"></span></div>
        <div class="line">HSK: <span id="resHSK"></span></div>
        <hr>
        <div class="line bold">PHƯƠNG THỨC TỐI ƯU:</div>
        <div id="phuongThucToiUu" style="color: green; font-weight: bold; margin-bottom: 10px;"></div>
        <div class="line bold">DIỂM XÉT TUYỂN CUỐI CÙNG:</div>
        <div id="ketQuaDiem" class="red-text">0.00 điểm</div>
    </div>

<script>
// Cơ sở dữ liệu mẫu ép toàn bộ về kiểu số nguyên bản để không bị lỗi nối chuỗi
var databaseBCA = [
 { "SBD": "08000001", "CCCD": "025086000001", "HOTEN": "ANH QUANG", "MON1": 10, "MON2": 9.5, "MON3": 8, "DIEMBCA": 80, "DIEMCONG": 0.25, "IELTS": 7.0, "HSK": 0 },
 { "SBD": "08000002", "CCCD": "025086000002", "HOTEN": "VŨ LÂM", "MON1": 9, "MON2": 10, "MON3": 9, "DIEMBCA": 79, "DIEMCONG": 0.25, "IELTS": 8.0, "HSK": 0 },
 { "SBD": "08000003", "CCCD": "025086000003", "HOTEN": "LINH HƯƠNG", "MON1": 8, "MON2": 9.5, "MON3": 7, "DIEMBCA": 68, "DIEMCONG": 0.25, "IELTS": 0, "HSK": 5 },
 { "SBD": "08000004", "CCCD": "025086000004", "HOTEN": "BẢO NGỌC", "MON1": 8, "MON2": 8, "MON3": 7, "DIEMBCA": 65, "DIEMCONG": 0.5, "IELTS": 6.5, "HSK": 0 },
 { "SBD": "08000005", "CCCD": "025086000005", "HOTEN": "THANH HUYỀN", "MON1": 7, "MON2": 8, "MON3": 9, "DIEMBCA": 60, "DIEMCONG": 0.75, "IELTS": 7.0, "HSK": 0 }
];

function xuLyTraCuu() {
    // 1. Reset trạng thái ẩn hiện các hộp chứa
    document.getElementById("errorBox").style.display = "none";
    document.getElementById("ketQuaBox").style.display = "none";
    
    // 2. Lấy chuỗi dữ liệu đầu vào
    var sbdInput = document.getElementById("searchSBD").value.trim();
    var cccdInput = document.getElementById("searchCCCD").value.trim();
    
    if (sbdInput === "" || cccdInput === "") {
        document.getElementById("errorBox").innerText = "Vui lòng điền đủ thông tin!";
        document.getElementById("errorBox").style.display = "block";
        return;
    }
    
    // 3. Vòng lặp tìm kiếm thí sinh thô sơ
    var tìmThấy = null;
    for (var i = 0; i < databaseBCA.length; i++) {
        if (databaseBCA[i].SBD === sbdInput && databaseBCA[i].CCCD === cccdInput) {
            tìmThấy = databaseBCA[i];
            break;
        }
    }
    
    if (tìmThấy === null) {
        document.getElementById("errorBox").innerText = "Không tìm thấy dữ liệu khớp!";
        document.getElementById("errorBox").style.display = "block";
        return;
    }
    
    // 4. Ép kiểu dữ liệu số thô, loại trừ 100% khả năng xung đột chuỗi ký tự văn bản
    var m1 = Number(tìmThấy.MON1);
    var m2 = Number(tìmThấy.MON2);
    var m3 = Number(tìmThấy.MON3);
    var bca = Number(tìmThấy.DIEMBCA);
    var cong = Number(tìmThấy.DIEMCONG);
    var ieltsVal = Number(tìmThấy.IELTS);
    var hskVal = Number(tìmThấy.HSK);
    
    // 5. Logic quy đổi chứng chỉ ngoại ngữ quốc tế thuần số học
    var qdCC = 0;
    if (ieltsVal >= 7.5 || hskVal >= 5) { qdCC = 10; }
    else if (ieltsVal >= 7.0) { qdCC = 9.5; }
    else if (ieltsVal >= 6.5 || hskVal === 4) { qdCC = 8.5; }
    else if (ieltsVal >= 6.0) { qdCC = 8.0; }
    else if (ieltsVal >= 5.5) { qdCC = 7.5; }
    
    // 6. Tính điểm Phương thức 2
    var scorePT2 = 0;
    if (qdCC > 0) {
        var pt2_thpt = qdCC * 3 * 0.4;
        var pt2_bca = bca * 0.6 * 0.3;
        var pt2_thuong = cong;
        if ((pt2_thpt + pt2_bca) >= 22.5) {
            pt2_thuong = ((30 - (pt2_thpt + pt2_bca)) / 7.5) * cong;
        }
        scorePT2 = pt2_thpt + pt2_bca + pt2_thuong;
    }
    
    // 7. Tính điểm Phương thức 3
    var diemM3 = m3;
    if (qdCC > m3) { diemM3 = qdCC; }
    var pt3_thpt = (m1 + m2 + diemM3) * 0.4;
    var pt3_bca = bca * 0.6 * 0.3;
    var pt3_thuong = cong;
    if ((pt3_thpt + pt3_bca) >= 22.5) {
        pt3_thuong = ((30 - (pt3_thpt + pt3_bca)) / 7.5) * cong;
    }
    var scorePT3 = pt3_thpt + pt3_bca + pt3_thuong;
    
    // 8. So sánh đại số và chuẩn hóa văn bản hiển thị phương thức tối ưu
    var diemCuoi = scorePT3;
    var txtPT = "PT3 (Diem THPT goc cao hon)";
    if (qdCC > m3) { txtPT = "PT3 (Da thay diem chung chi vao mon 3)"; }
    if (scorePT2 > scorePT3) {
        diemCuoi = scorePT2;
        txtPT = "PT2 (Su dung chung chi de xet tuyen)";
    }
    
    // 9. Đổ trực tiếp dữ liệu thô ra màn hình (Không gọi biểu thức phức tạp)
    document.getElementById("resName").innerText = tìmThấy.HOTEN;
    document.getElementById("resSBD").innerText = tìmThấy.SBD;
    document.getElementById("resM1").innerText = m1;
    document.getElementById("resM2").innerText = m2;
    document.getElementById('resM3').innerText = m3;
    document.getElementById("resBCA").innerText = bca;
    document.getElementById("resCong").innerText = cong;
    document.getElementById("resIELTS").innerText = ieltsVal;
    document.getElementById("resHSK").innerText = hskVal;
    
    document.getElementById("phuongThucToiUu").innerText = txtPT;
    document.getElementById("ketQuaDiem").innerText = diemCuoi.toFixed(2) + " diem";
    
    // 10. Mở khối hiển thị kết quả công khai
    document.getElementById("ketQuaBox").style.display = "block";
}
</script>
</body>
</html>
