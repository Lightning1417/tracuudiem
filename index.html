<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRA CỨU ĐIỂM ĐGNL 2026</title>
    <style>
        body { font-family: Cambria, Georgia, serif; margin: 20px; }
        h2 {
    text-align: center; /* Căn giữa tiêu đề */
    margin-top: 0;      /* Xóa khoảng cách thừa phía trên */
    margin-bottom: 20px;/* Tạo khoảng cách hợp lý với khung nhập liệu bên dưới */
    color: #0A192F;     /* Đổi màu chữ sang tông tối hiện đại */
}
        .container { 
    max-width: 500px; 
    margin: auto; 
    border: 1px solid #e2e8f0; 
    padding: 25px; 
    border-radius: 12px; /* Bo góc khung chính */
    box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); /* Đổ bóng mịn hiện đại */
}
        .section-box { margin-bottom: 15px; border: 1px solid #ddd; padding: 10px; }
        .section-title { 
    font-weight: bold; 
    margin-bottom: 15px; 
    text-align: center;         /* Căn giữa tiêu đề của khung nhập */
    color: #0A192F;             /* Đổi màu chữ sang tông xám đậm hiện đại */
}
        .form-group { 
    margin-bottom: 12px; 
    display: flex;             /* Kích hoạt hiển thị trên cùng một dòng */
    align-items: center;       /* Căn giữa chữ và ô nhập theo chiều dọc */
    justify-content: space-between; /* Đẩy chữ sang trái, ô nhập sang phải */
}
        .form-group label { 
    font-weight: bold;
    white-space: nowrap;       /* Giữ chữ không bị xuống hàng khi co màn hình */
    margin-right: 10px;        /* Tạo khoảng cách nhỏ giữa chữ và ô nhập */
    flex-shrink: 0;
    color: #0A192F;
}
        .form-group input { 
    flex-grow: 1;              
    padding: 10px;             /* Tăng nhẹ padding để ô nhập cân đối với chữ to */
    border: 1px solid #cbd5e1;
    border-radius: 6px; 
    box-sizing: border-box;    
    font-size: 16px;           /* Tăng cỡ chữ bên trong ô nhập liệu */
    font-family: Cambria, Georgia, serif; /* Đảm bảo ô nhập cũng ăn theo phông Cambria */
}
      .btn-search { 
    width: 100%; 
    padding: 12px; 
    background-color: #0A192F; 
    color: white; 
    border: none; 
    cursor: pointer; 
    border-radius: 8px; 
    font-weight: bold;
    font-size: 16px;           /* (Tùy chọn) Tăng cỡ chữ nút bấm cho rõ ràng */
    font-family: Cambria, Georgia, serif; /* Đổi phông chữ nút bấm sang Cambria */
    box-shadow: 0 4px 6px -1px rgba(0, 86, 179, 0.2); 
    transition: all 0.2s;
}
        .btn-search:active {
    transform: scale(0.98);
}
        .error-text { color: red; display: none; margin-top: 10px; }
        #ketQuaBox { display: none; margin-top: 20px; border-top: 2px solid #000; padding-top: 15px; }
        .result-row { margin-bottom: 8px; }
        .result-label { font-weight: normal; display: inline-block; width: 180px; color: #0A192F; }
        .text-bold { font-weight: bold !important; }
        .final-score-box { 
    background-color: #f8f9fa; 
    border: 1px dashed #6c757d; 
    padding: 15px; 
    margin-top: 15px; 
    border-radius: 8px; 
    font-family: Cambria, Georgia, serif; 
    
    /* CẤU HÌNH THÊM ĐỂ ĐƯA LOGO NẰM BÊN TRÁI CHỮ */
    display: flex;            /* Kích hoạt hiển thị hàng ngang */
    align-items: center;      /* Căn giữa logo và chữ theo chiều dọc */
    text-align: left;         /* Chuyển căn lề chữ từ giữa sang trái */
    gap: 15px;                /* Tạo khoảng cách giữa logo và khối chữ */
}

/* Thêm cấu hình kích thước cho riêng logo trong hộp này */
        .final-score-box img {
    width: 60px;              /* Thiết lập chiều rộng vừa vặn */
    height: auto;
    flex-shrink: 0;           /* Không cho logo bị méo/co lại */
}

/* Thêm cấu hình bao bọc phần chữ bên phải */
        .final-score-text {
    flex-grow: 1;             /* Chiếm trọn phần không gian còn lại */
}
        #ketQuaDiem { font-size: 20px; font-weight: bold; color: red; margin: 5px 0 0 0; }
        #phuongThucToiUu { font-style: italic; color: green; margin-top: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h2>TRA CỨU ĐIỂM ĐGNL 2026</h2>
    
    <div class="section-box">
        <div class="section-title">Nhập thông tin tra cứu</div>
        <div class="form-group">
            <label>Số báo danh (SBD):</label>
            <input type="text" id="searchSBD" placeholder="Ví dụ: 08000001">
        </div>
        <div class="form-group">
            <label>Số Căn cước (CCCD):</label>
            <input type="text" id="searchCCCD" placeholder="Nhập 12 số CCCD">
        </div>
    </div>
    
    <!-- GIỮ NGUYÊN THUỘC TÍNH ONCLICK THÔ SƠ GỐC -->
    <button onclick="xuLyTraCuu()" class="btn-search">KẾT QUẢ</button>
    
    <div id="errorBox" class="error-text"></div>
    
    <div id="ketQuaBox">
        <div class="result-row"><span class="result-label">Họ và tên thí sinh:</span><span class="result-value" id="resName">--</span></div>
        <div class="result-row"><span class="result-label">Số báo danh:</span><span class="result-value" id="resSBD">--</span></div>
        <div class="result-row"><span class="result-label">Môn 1:</span><span class="result-value" id="resM1">0.00</span></div>
        <div class="result-row"><span class="result-label">Môn 2:</span><span class="result-value" id="resM2">0.00</span></div>
        <div class="result-row"><span class="result-label">Môn 3 (Ngoại ngữ):</span><span class="result-value" id="resM3">0.00</span></div>
        <div class="result-row"><span class="result-label">Điểm ĐGNL BCA:</span><span class="result-value text-bold" id="resBCA"> 🦅 0.00</span></div>
        <div class="result-row"><span class="result-label">Điểm Cộng Gốc:</span><span class="result-value" id="resCong">0.00</span></div>
        <div class="result-row"><span class="result-label">Điểm IELTS:</span><span class="result-value" id="resIELTS">0.0</span></div>
        <div class="result-row"><span class="result-label">Cấp HSK:</span><span class="result-value" id="resHSK">0</span></div>
        
        <div class="final-score-box">
    <!-- CHÈN THÊM LOGO VÀO BÊN TRÁI -->
    <img src="logobca.svg.png" alt="Logo">
    
    <!-- BỌC PHẦN CHỮ VÀO KHỐI NÀY -->
    <div class="final-score-text">
        <div style="font-size:13px; font-weight:bold; color:#4a5568; text-transform: uppercase;">Điểm Xét Tuyển Cuối Cùng</div>
        <div id="phuongThucToiUu"></div>
        <p id="ketQuaDiem" style="margin: 5px 0 0 0;">0.00 điểm</p>
    </div>
</div>
</div>

<script>
var databaseBCA = [
 { "SBD": "08000001", "CCCD": "025086000001", "HOTEN": "ANH QUANG", "MON1": 10, "MON2": 9.5, "MON3": 8, "DIEMBCA": 80, "DIEMCONG": 0.25, "IELTS": 7.0, "HSK": 0 },
 { "SBD": "08000002", "CCCD": "025086000002", "HOTEN": "VŨ LÂM", "MON1": 9, "MON2": 10, "MON3": 9, "DIEMBCA": 79, "DIEMCONG": 0.25, "IELTS": 8.0, "HSK": 0 },
 { "SBD": "08000003", "CCCD": "025086000003", "HOTEN": "LINH HƯƠNG", "MON1": 8, "MON2": 9.5, "MON3": 7, "DIEMBCA": 68, "DIEMCONG": 0.25, "IELTS": 0, "HSK": 5 },
 { "SBD": "08000004", "CCCD": "025086000004", "HOTEN": "BẢO NGỌC", "MON1": 8, "MON2": 8, "MON3": 7, "DIEMBCA": 65, "DIEMCONG": 0.5, "IELTS": 6.5, "HSK": 0 },
 { "SBD": "08000005", "CCCD": "025086000005", "HOTEN": "THANH HUYỀN", "MON1": 7, "MON2": 8, "MON3": 9, "DIEMBCA": 60, "DIEMCONG": 0.75, "IELTS": 7.0, "HSK": 0 }
];

function hienThiLoi(msg) {
    var errorBox = document.getElementById('errorBox');
    if (errorBox) {
        errorBox.innerHTML = msg;
        errorBox.style.display = 'block';
    }
}

function xuLyTraCuu() {
    document.getElementById("errorBox").style.display = "none";
    document.getElementById("ketQuaBox").style.display = "none";
    
    var sbdInput = document.getElementById("searchSBD").value.trim();
    var cccdInput = document.getElementById("searchCCCD").value.trim();
    
    if (sbdInput === "" || cccdInput === "") {
        hienThiLoi("Vui lòng điền đủ thông tin!");
        return;
    }
    
    var tìmThấy = null;
    for (var i = 0; i < databaseBCA.length; i++) {
        if (databaseBCA[i].SBD === sbdInput && databaseBCA[i].CCCD === cccdInput) {
            tìmThấy = databaseBCA[i];
            break;
        }
    }
    
    if (tìmThấy === null) {
        hienThiLoi("Không tìm thấy dữ liệu khớp!");
        return;
    }
    
    var m1 = Number(tìmThấy.MON1);
    var m2 = Number(tìmThấy.MON2);
    var m3 = Number(tìmThấy.MON3);
    var bca = Number(tìmThấy.DIEMBCA);
    var cong = Number(tìmThấy.DIEMCONG);
    var ieltsVal = Number(tìmThấy.IELTS);
    var hskVal = Number(tìmThấy.HSK);
    
    var qdCC = 0;
    if (ieltsVal >= 7.5 || hskVal >= 5) { qdCC = 10; }
    else if (ieltsVal >= 7.0) { qdCC = 9.5; }
    else if (ieltsVal >= 6.5 || hskVal === 4) { qdCC = 8.5; }
    else if (ieltsVal >= 6.0) { qdCC = 8.0; }
    else if (ieltsVal >= 5.5) { qdCC = 7.5; }
    
    var scorePT2 = 0;
    if (qdCC > 0) {
        var pt2_thpt = qdCC * 3 * 0.4;
        var pt2_bca = bca * 0.6 * 0.3;
        var pt2_thuong = cong;
        if ((pt2_thpt + pt2_bca) >= 22.5) {
            pt2_thuong = ((30 - (pt2_thpt + pt2_bca)) / 7.5) * cong;
        }
        scorePT2 = pt2_thpt + pt2_bca + pt2_thuong;
    }
    
    var diemM3 = m3;
    if (qdCC > m3) { diemM3 = qdCC; }
    var pt3_thpt = (m1 + m2 + diemM3) * 0.4;
    var pt3_bca = bca * 0.6 * 0.3;
    var pt3_thuong = cong;
    if ((pt3_thpt + pt3_bca) >= 22.5) {
        pt3_thuong = ((30 - (pt3_thpt + pt3_bca)) / 7.5) * cong;
    }
    var scorePT3 = pt3_thpt + pt3_bca + pt3_thuong;
    
    var diemCuoi = scorePT3;
    var txtPT = "PT3 (Điểm THPT cao hơn)";

    if (scorePT2 > scorePT3) {
        diemCuoi = scorePT2;
        txtPT = "PT2 (Chứng chỉ quốc tế)";
    }

    document.getElementById("resName").innerText = tìmThấy.HOTEN;
    document.getElementById("resSBD").innerText = tìmThấy.SBD;
    document.getElementById("resM1").innerText = m1.toFixed(2);
    document.getElementById("resM2").innerText = m2.toFixed(2);
    document.getElementById("resM3").innerText = m3.toFixed(2);
    document.getElementById("resBCA").innerText = bca.toFixed(2);
    document.getElementById("resCong").innerText = cong.toFixed(2);
    document.getElementById("resIELTS").innerText = ieltsVal.toFixed(1);
    document.getElementById("resHSK").innerText = hskVal;

    document.getElementById("phuongThucToiUu").innerText = txtPT;
    document.getElementById("ketQuaDiem").innerText = diemCuoi.toFixed(2) + " điểm";
    document.getElementById("ketQuaBox").style.display = "block";
}
</script>
</body>
</html>
