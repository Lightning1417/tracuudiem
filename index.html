<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tra Cứu Điểm ĐGNL 2026</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 15px; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; box-sizing: border-box; }
        .container { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 10px 30px rgba(16, 48, 87, 0.08); width: 100%; max-width: 480px; box-sizing: border-box; border-top: 5px solid #103057; }
        h2 { text-align: center; color: #103057; margin-top: 0; margin-bottom: 20px; font-size: 19px; font-weight: 700; text-transform: uppercase; }
        .section-box { background: #fafafa; padding: 15px; border-radius: 10px; border: 1px solid #eef0f4; margin-bottom: 15px; }
        .section-title { font-weight: 700; color: #103057; margin-bottom: 12px; font-size: 13px; text-transform: uppercase; }
        .form-group { margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; }
        label { width: 45%; font-size: 13px; color: #4a5568; font-weight: 500; }
        input { width: 52%; padding: 10px; border: 1px solid #cbd5e0; border-radius: 8px; box-sizing: border-box; font-size: 15px; background-color: white; }
        input:focus { outline: none; border-color: #103057; }
        .btn-search { width: 100%; padding: 14px; background-color: #103057; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; margin-top: 5px; text-transform: uppercase; display: block; }
        .btn-search:hover { background-color: #1a4475; }
        .error-box { margin-top: 15px; padding: 12px; background-color: #fff5f5; border-left: 4px solid #e53e3e; color: #c53030; font-size: 13px; border-radius: 4px; display: none; text-align: center; font-weight: 500; }
        #ketQuaBox { margin-top: 20px; padding: 18px; border: 2px dashed #103057; border-radius: 12px; background-color: #f7fafc; display: none; }
        .result-row { display: flex; justify-content: space-between; font-size: 13px; color: #2d3748; padding: 6px 0; border-bottom: 1px dashed #e2e8f0; }
        .result-label { font-weight: 500; color: #4a5568; }
        .result-value { font-weight: 700; color: #103057; }
    </style>
</head>
<body>
<div class="container">
    <h2>Tra Cứu Điểm ĐGNL 2026</h2>
    
    <div class="section-box">
        <div class="section-title">Nhập Thông Tin Tra Cứu</div>
        <div class="form-group">
            <label for="searchSBD">Số báo danh (SBD):</label>
            <input type="text" id="searchSBD" placeholder="Ví dụ: 08000001">
        </div>
        <div class="form-group">
            <label for="searchCCCD">Số Căn cước (CCCD):</label>
            <input type="text" id="searchCCCD" placeholder="Nhập 12 số CCCD">
        </div>
    </div>
    
    <button type="button" id="btnSubmitSearch" class="btn-search">Tìm Kiếm Kết Quả</button>
    <div id="errorBox" class="error-box"></div>
    
    <div id="ketQuaBox">
        <div class="result-row"><span class="result-label">Họ và tên thí sinh:</span><span class="result-value" id="resName">--</span></div>
        <div class="result-row"><span class="result-label">Số báo danh:</span><span class="result-value" id="resSBD">--</span></div>
        <div class="result-row"><span class="result-label">Môn 1:</span><span class="result-value" id="resM1">0.00</span></div>
        <div class="result-row"><span class="result-label">Môn 2:</span><span class="result-value" id="resM2">0.00</span></div>
        <div class="result-row"><span class="result-label">Môn 3 (Ngoại ngữ):</span><span class="result-value" id="resM3">0.00</span></div>
        <div class="result-row"><span class="result-label">Điểm Thi ĐGNL BCA:</span><span class="result-value" id="resBCA">0.00</span></div>
        <div class="result-row"><span class="result-label">Điểm Cộng Gốc:</span><span class="result-value" id="resCong">0.00</span></div>
        <div class="result-row"><span class="result-label">Điểm IELTS:</span><span class="result-value" id="resIELTS">0.0</span></div>
        <div class="result-row"><span class="result-label">Cấp HSK:</span><span class="result-value" id="resHSK">0</span></div>
    </div>
</div>

<script>
// Cơ sở dữ liệu mẫu dạng số chuẩn
var databaseBCA = [
 { "SBD": "08000001", "CCCD": "025086000001", "HOTEN": "ANH QUANG", "MON1": 10, "MON2": 9.5, "MON3": 8, "DIEMBCA": 80, "DIEMCONG": 0.25, "IELTS": 7.0, "HSK": 0 },
 { "SBD": "08000002", "CCCD": "025086000002", "HOTEN": "VŨ LÂM", "MON1": 9, "MON2": 10, "MON3": 9, "DIEMBCA": 79, "DIEMCONG": 0.25, "IELTS": 8.0, "HSK": 0 },
 { "SBD": "08000003", "CCCD": "025086000003", "HOTEN": "LINH HƯƠNG", "MON1": 8, "MON2": 9.5, "MON3": 7, "DIEMBCA": 68, "DIEMCONG": 0.25, "IELTS": 0, "HSK": 5 }
];

function hienThiLoi(msg) {
    var errorBox = document.getElementById('errorBox');
    if (errorBox) {
        errorBox.innerHTML = msg;
        errorBox.style.display = 'block';
    }
}

document.addEventListener("DOMContentLoaded", function() {
    var nutTraCuu = document.getElementById('btnSubmitSearch');
    if (nutTraCuu) {
        nutTraCuu.addEventListener("click", function() {
            var errorBox = document.getElementById('errorBox');
            var ketQuaBox = document.getElementById('ketQuaBox');
            
            if (errorBox) errorBox.style.display = 'none';
            if (ketQuaBox) ketQuaBox.style.display = 'none';
            
            var valSBD = document.getElementById('searchSBD').value.trim();
            var valCCCD = document.getElementById('searchCCCD').value.trim();

            if (valSBD === "" || valCCCD === "") {
                hienThiLoi("Vui lòng nhập đầy đủ SBD và CCCD.");
                return;
            }

            var ts = null;
            for (var i = 0; i < databaseBCA.length; i++) {
                if (databaseBCA[i].SBD === valSBD && databaseBCA[i].CCCD === valCCCD) {
                    ts = databaseBCA[i];
                    break;
                }
            }

            if (ts !== null) {
                // Đổ trực tiếp dữ liệu thô không qua tính toán công thức xét tuyển
                document.getElementById('resName').innerText = ts.HOTEN;
                document.getElementById('resSBD').innerText = ts.SBD;
                document.getElementById('resM1').innerText = (parseFloat(ts.MON1) || 0).toFixed(2);
                document.getElementById('resM2').innerText = (parseFloat(ts.MON2) || 0).toFixed(2);
                document.getElementById('resM3').innerText = (parseFloat(ts.MON3) || 0).toFixed(2);
                document.getElementById('resBCA').innerText = (parseFloat(ts.DIEMBCA) || 0).toFixed(2);
                document.getElementById('resCong').innerText = (parseFloat(ts.DIEMCONG) || 0).toFixed(2);
                document.getElementById('resIELTS').innerText = ts.IELTS !== "0" && ts.IELTS !== 0 ? ts.IELTS : "Không có";
                document.getElementById('resHSK').innerText = ts.HSK !== "0" && ts.HSK !== 0 ? "Cấp " + ts.HSK : "Không có";
                
                if (ketQuaBox) ketQuaBox.style.display = 'block';
            } else {
                hienThiLoi("Không tìm thấy dữ liệu thí sinh. Vui lòng kiểm tra lại SBD và CCCD.");
            }
        });
    }
});
</script>
</body>
</html>
