<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRA CỨU ĐIỂM ĐGNL 2026</title>
    <style>
        /* Toàn bộ giao diện */
        body { 
            font-family: Cambria, Georgia, serif; 
            margin: 20px; 
            background-color: #f8fafc; /* Thêm màu nền xám nhạt nhẹ giúp khung tra cứu nổi bật hơn */
        }
        
        /* Khung chứa chính */
        .container { 
            max-width: 500px; 
            width: 100%;
            margin: auto; 
            border: 1px solid #e2e8f0; 
            padding: 25px; 
            border-radius: 12px; 
            background-color: #ffffff;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.03); 
            box-sizing: border-box;
        }

        /* Đầu trang: Logo & Tiêu đề */
        .header-wrapper {
            display: flex;            
            align-items: center;      
            justify-content: center;  
            gap: 16px;                
            margin-bottom: 15px;      
            margin-top: 5px; 
        }
        .header-logo {
            width: 75px;              
            height: auto;
            flex-shrink: 0; 
        }
        .header-wrapper h2 {
            margin: 0;                
            color: #0A192F;           
            font-size: 19px;          
            text-transform: uppercase;
            line-height: 1.3;         
            text-align: center;         
        }

        /* Khung nhập liệu phụ */
        .section-box { 
            margin-bottom: 15px; 
            border: 1px solid #e2e8f0; 
            padding: 15px; 
            border-radius: 8px;
        }
        .section-title { 
            font-weight: bold; 
            margin-bottom: 15px; 
            text-align: center;         
            color: #0A192F; 
            font-size: 15px;
        }
        .form-group { 
            margin-bottom: 12px; 
            display: flex;             
            align-items: center;       
            justify-content: space-between; 
            gap: 10px;
        }
        .form-group:last-child {
            margin-bottom: 0;
        }
        .form-group label { 
            font-weight: normal;
            white-space: nowrap;       
            flex-shrink: 0;
            color: #0A192F; 
            font-size: 15px;
        }

        /* Khung bọc ô nhập CCCD ẩn hiện con mắt */
        .password-wrapper {
            position: relative;
            flex-grow: 1;
            display: flex;
            align-items: center;
        }
        .form-group input { 
            width: 100%;              
            padding: 10px;             
            border: 1px solid #cbd5e1;
            border-radius: 6px; 
            box-sizing: border-box;    
            font-size: 16px;           
            font-family: Cambria, Georgia, serif; 
            color: #0A192F;
            touch-action: manipulation;
        }
        .password-wrapper input {
            padding-right: 35px; /* Chừa khoảng trống bên phải không bị chữ đè lên mắt */
        }
        .toggle-password {
            position: absolute;
            right: 10px;
            cursor: pointer;
            font-size: 14px;
            user-select: none;
            opacity: 0.5;
            transition: opacity 0.2s;
        }
        .toggle-password:hover { opacity: 0.9; }

        /* Nút tra cứu */
        .btn-search { 
            width: 65%;              
            display: block;            
            margin: 15px auto 5px auto;         
            padding: 11px 14px; 
            background-color: #0A192F; 
            color: white; 
            border: none; 
            cursor: pointer; 
            border-radius: 6px; 
            font-weight: bold;
            font-family: Cambria, Georgia, serif;
            font-size: 15px;
            box-shadow: 0 4px 6px -1px rgba(10, 25, 47, 0.15); 
            transition: all 0.2s ease; 
        }
        .btn-search:active { transform: scale(0.97); }
        .btn-search:disabled { opacity: 0.7; cursor: not-down; }

        /* Vùng hiển thị kết quả */
        .error-text { color: red; display: none; margin-top: 10px; text-align: center; font-size: 14px; }
        #ketQuaBox { display: none; margin-top: 20px; border-top: 2px solid #0A192F; padding-top: 15px; }
        
        .result-row { 
            margin-bottom: 8px; 
            display: flex;
            justify-content: space-between; /* Đẩy tên/nhãn sang trái, số điểm sang phải để thẳng hàng tuyệt đối */
            font-size: 15px;
        }
        .result-label { font-weight: normal; color: #475569; }
        .result-value { color: #0A192F; text-align: right; }
        
        /* Thay thế cấu trúc :has bằng Class trực tiếp để tương thích 100% mọi đời máy */
        .row-bca {
            margin-top: 15px !important;    
            margin-bottom: 15px !important; 
            padding: 5px 0;                 
            border-top: 1px dashed #e2e8f0;    /* Thêm gạch mảnh nhẹ ngăn cách riêng dòng điểm ĐGNL */
            border-bottom: 1px dashed #e2e8f0;
        }
        .text-bold { font-weight: bold !important; color: #0A192F !important; }

        /* Icon Đại bàng hoạt họa */
        .eagle-icon {
            font-size: 20px;          
            margin-left: 6px;         
            display: inline-block;
            vertical-align: top;       
            position: relative;
            top: -10px;                 
            animation: pulseEagle 2s infinite ease-in-out; 
            transform-origin: center; 
        }
        @keyframes pulseEagle {
            0% { transform: scale(1); }
            50% { transform: scale(1.25); } 
            100% { transform: scale(1); } 
        }

        /* Hộp điểm tổng kết cuối cùng */
        .final-score-box { 
            background-color: #f8fafc; 
            border: 1px dashed #0A192F; 
            padding: 15px 15px 32px 15px; 
            margin-top: 18px; 
            text-align: center;                  
            border-radius: 8px; 
            font-family: Cambria, Georgia, serif; 
            position: relative; 
        }
        #ketQuaDiem { font-size: 22px; font-weight: bold; color: #dc2626; margin: 8px 0 0 0; }
        #phuongThucToiUu { font-style: italic; color: #16a34a; margin-top: 5px; font-size: 14px; font-weight: bold; }
        
        /* Góc dưới bên phải hiển thị thời gian thực */
        .time-stamp-box {
            position: absolute;
            bottom: 6px;                
            right: 12px;                
            font-size: 11px;            
            font-style: italic;
            color: #64748b;             
        }
    </style>
</head>
<body>
<div class="container">
    <!-- THAY THẾ TOÀN BỘ PHẦN LOGO VÀ H2 CŨ BẰNG ĐOẠN NÀY -->
    <div class="header-wrapper">
        <img class="header-logo" src="logobca.svg.png" alt="Logo">
        <h2>Tra cứu điểm<br>ĐGNL 2026</h2>
    </div> 
    <div class="section-box">
        <div class="section-title">Nhập thông tin tra cứu</div>
        <div class="form-group">
            <label>Số báo danh:</label>
            <input type="text" id="searchSBD" placeholder="Ví dụ: 08000001">
        </div>
        <div class="form-group">
            <label>Căn cước:</label>
            <input type="password" id="searchCCCD" placeholder="Nhập 12 số CCCD" oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 12)">
            <span class="toggle-password" onclick="chuyenDoiAnHienCCCD()">👁️</span>
        </div>
    </div>
    <!-- GIỮ NGUYÊN THUỘC TÍNH ONCLICK THÔ SƠ GỐC -->
    <button onclick="xuLyTraCuu()" class="btn-search">KẾT QUẢ</button>
    <div id="errorBox" class="error-text"></div>
    <div id="ketQuaBox">
        <div class="result-row"><span class="result-label">Họ và tên thí sinh:</span><span class="result-value" id="resName">--</span></div>
        <div class="result-row"><span class="result-label">Số báo danh:</span><span class="result-value" id="resSBD">--</span></div>
        <div class="result-row"><span class="result-label">Môn 1:</span><span class="result-value" id="resM1">0.00</span></div>
        <div class="result-row"><span class="result-label">Môn 2:</span><span class="result-value" id="resM2">0.00</span></div>
        <div class="result-row"><span class="result-label">Môn 3 (Ngoại ngữ):</span><span class="result-value" id="resM3">0.00</span></div>
        <div class="result-row"><span class="result-label">Điểm ĐGNL BCA:</span><span class="result-value text-bold" id="resBCA">0.00</span><span class="eagle-icon">  🦅</span>
</div>
        <div class="result-row"><span class="result-label">Điểm cộng gốc:</span><span class="result-value" id="resCong">0.00</span></div>
        <div class="result-row"><span class="result-label">Điểm IELTS:</span><span class="result-value" id="resIELTS">0.0</span></div>
        <div class="result-row"><span class="result-label">Cấp HSK:</span><span class="result-value" id="resHSK">0</span></div>
        
       <div class="final-score-box">
    <div style="font-size:13px; font-weight:bold; color:#0A192F; text-transform: uppercase;">Điểm Xét Tuyển</div>
    <div id="phuongThucToiUu"></div>
    <p id="ketQuaDiem">0.00 điểm</p>
           <!-- DÒNG THỜI GIAN ĐƯỢC CHUYỂN VÀO ĐÂY VÀ ĐẶT CLASS RIÊNG -->
    <div class="time-stamp-box">
        Thời gian tra cứu: <span id="thoiGianTraCuu">--:-- --/--/----</span>
    </div>
</div>
</div>

<script>
// 1. DATABASE MẪU (Bỏ trống vì dữ liệu đã chuyển lên Google Sheets)
var databaseBCA = [];

// 2. HÀM HIỂN THỊ LỖI
function hienThiLoi(msg) {
    var errorBox = document.getElementById('errorBox');
    if (errorBox) {
        errorBox.innerHTML = msg;
        errorBox.style.display = 'block';
    }
}

// 3. BIẾN ĐẾM CHỐNG SPAM
var soLanSaiLienTiep = 0;
var dangBiKhoaSpam = false;

// 4. HÀM ẨN HIỆN SỐ CĂN CƯỚC
function chuyenDoiAnHienCCCD() {
    var cccdField = document.getElementById("searchCCCD");
    var iconConMat = document.querySelector(".toggle-password");
    
    if (cccdField.type === "password") {
        cccdField.type = "text";
        iconConMat.innerText = "🔒"; 
        iconConMat.style.opacity = "0.9";
    } else {
        cccdField.type = "password";
        iconConMat.innerText = "👁️"; 
        iconConMat.style.opacity = "0.6";
    }
}

// 5. HÀM XỬ LÝ TRA CỨU CHÍNH
async function xuLyTraCuu() {
    document.getElementById("errorBox").style.display = "none";
    document.getElementById("ketQuaBox").style.display = "none";
    
    // Kiểm tra trạng thái khóa Spam
    if (dangBiKhoaSpam) {
        hienThiLoi("Bạn đã nhập sai nhiều lần. Vui lòng thử lại sau giây lát!");
        return;
    }
    
    var sbdInput = document.getElementById("searchSBD").value.trim();
    var cccdInput = document.getElementById("searchCCCD").value.trim();
    
    if (sbdInput === "" || cccdInput === "") {
        hienThiLoi("Vui lòng điền đủ thông tin!");
        return;
    }
    
    if (cccdInput.length !== 12) {
        hienThiLoi("Số Căn cước công dân phải có đúng 12 chữ số!");
        return;
    }
    
    // Đổi trạng thái nút bấm
    var btn = document.querySelector(".btn-search");
    var textGoc_btn = btn.innerText;
    btn.innerText = "Đang tra cứu dữ liệu...";
    btn.disabled = true;
    
    // Đường dẫn kết nối API Google Sheets bảo mật
    var URL_API_GOOGLE = "https://script.google.com/macros/s/AKfycbxz-hqMBXUd94deN_1rL_sjSRF5CxWMny3q58sWrdv9kDdfodN2bLmtHosggnajadMN/exec"; 
    
    var tìmThấy = null;
    
    try {
        var response = await fetch(URL_API_GOOGLE, {
            method: "POST",
            body: JSON.stringify({ sbd: sbdInput, cccd: cccdInput })
        });
        
        var result = await response.json();
        
        if (result.success === false) {
            hienThiLoi(result.error);
            btn.innerText = textGoc_btn;
            btn.disabled = false;
            
            // Xử lý đếm số lần nhập sai liên tiếp
            soLanSaiLienTiep++;
            if (soLanSaiLienTiep >= 3) {
                dangBiKhoaSpam = true;
                btn.disabled = true;
                var giayDemNguoc = 10;
                
                var boDemTime = setInterval(function() {
                    giayDemNguoc--;
                    btn.innerText = "Thử lại sau (" + giayDemNguoc + "s)";
                    if (giayDemNguoc <= 0) {
                        clearInterval(boDemTime);
                        dangBiKhoaSpam = false;
                        soLanSaiLienTiep = 0;
                        btn.innerText = textGoc_btn;
                        btn.disabled = false;
                        document.getElementById("errorBox").style.display = "none";
                    }
                }, 1000);
            }
            return;
        }
        
        soLanSaiLienTiep = 0; 
        tìmThấy = result.data;
        
    } catch (error) {
        hienThiLoi("Lỗi kết nối đường truyền mạng hoặc link API sai!");
        btn.innerText = textGoc_btn;
        btn.disabled = false;
        return;
    }
    
    // Khôi phục trạng thái nút bấm
    btn.innerText = textGoc_btn;
    btn.disabled = false;

    // 6. LOGIC TÍNH TOÁN ĐIỂM SỐ
    var m1 = Number(tìmThấy.MON1);
    var m2 = Number(tìmThấy.MON2);
    var m3 = Number(tìmThấy.MON3);
    var bca = Number(tìmThấy.DIEMBCA);
    var cong = Number(tìmThấy.DIEMCONG);
    var ieltsVal = Number(tìmThấy.IELTS);
    var hskVal = Number(tìmThấy.HSK);
    
    var qdCC = 0;
    if (ieltsVal >= 7.5 || hskVal >= 5) { qdCC = 10; }
    else if (ieltsVal >= 7.0) { qdCC = 9.5; }
    else if (ieltsVal >= 6.5 || hskVal === 4) { qdCC = 8.5; }
    else if (ieltsVal >= 6.0) { qdCC = 8.0; }
    else if (ieltsVal >= 5.5) { qdCC = 7.5; }
    
    var scorePT2 = 0;
    if (qdCC > 0) {
        var pt2_thpt = qdCC * 3 * 0.4;
        var pt2_bca = bca * 0.6 * 0.3;
        var pt2_thuong = cong;
        if ((pt2_thpt + pt2_bca) >= 22.5) {
            pt2_thuong = ((30 - (pt2_thpt + pt2_bca)) / 7.5) * cong;
        }
        scorePT2 = pt2_thpt + pt2_bca + pt2_thuong;
    }
    
    var diemM3 = m3;
    if (qdCC > m3) { diemM3 = qdCC; }
    var pt3_thpt = (m1 + m2 + diemM3) * 0.4;
    var pt3_bca = bca * 0.6 * 0.3;
    var pt3_thuong = cong;
    if ((pt3_thpt + pt3_bca) >= 22.5) {
        pt3_thuong = ((30 - (pt3_thpt + pt3_bca)) / 7.5) * cong;
    }
    var scorePT3 = pt3_thpt + pt3_bca + pt3_thuong;
    
    var diemCuoi = scorePT3;
    var txtPT = "PT3 (Điểm THPT cao hơn)";

    if (scorePT2 > scorePT3) {
        diemCuoi = scorePT2;
        txtPT = "PT2 (Chứng chỉ quốc tế)";
    }

    // 7. ĐỔ DỮ LIỆU RA GIAO DIỆN HIỂN THỊ
    document.getElementById("resName").innerText = tìmThấy.HOTEN;
    document.getElementById("resSBD").innerText = tìmThấy.SBD;
    document.getElementById("resM1").innerText = m1.toFixed(2);
    document.getElementById("resM2").innerText = m2.toFixed(2);
    document.getElementById("resM3").innerText = m3.toFixed(2);
    document.getElementById("resBCA").innerText = bca.toFixed(2);
    document.getElementById("resCong").innerText = cong.toFixed(2);
    
    // TÍNH TOÁN VÀ ĐIỀN THỜI GIAN THỰC (ĐÃ BỔ SUNG ĐẦY ĐỦ)
    try {
        var bayGio = new Date();
        var gio = String(bayGio.getHours()).padStart(2, '0');
        var phut = String(bayGio.getMinutes()).padStart(2, '0');
        var ngay = String(bayGio.getDate()).padStart(2, '0');
        var thang = String(bayGio.getMonth() + 1).padStart(2, '0');
        var nam = bayGio.getFullYear();
        
        var chuoiThoiGian = gio + ":" + phut + " - " + ngay + "/" + thang + "/" + nam;
        
        var elementThoiGian = document.getElementById("thoiGianTraCuu");
        if (elementThoiGian) {
            elementThoiGian.innerText = chuoiThoiGian;
        }
    } catch(e) {
        console.error("Lỗi thời gian:", e);
    }
    
    // Xử lý hiển thị giá trị chuỗi trống hoặc số không xác định
    document.getElementById("resIELTS").innerText = isNaN(ieltsVal) || ieltsVal === 0 ? "0.0" : ieltsVal.toFixed(1);
    document.getElementById("resHSK").innerText = isNaN(hskVal) ? "0" : hskVal;

    document.getElementById("phuongThucToiUu").innerText = txtPT;
    document.getElementById("ketQuaDiem").innerText = diemCuoi.toFixed(2) + " điểm";
    
    // KÍCH HOẠT HIỂN THỊ HỘP KẾT QUẢ
    document.getElementById("ketQuaBox").style.display = "block";
}
</script>
</body>
</html>
